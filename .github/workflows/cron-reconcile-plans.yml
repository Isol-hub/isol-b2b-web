name: Reconcile Stripe Plans

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC every night
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call reconcile endpoint
        run: |
          response=$(curl -s -o /tmp/body.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            https://isolstudio.live/api/crons/reconcile-plans)

          echo "HTTP status: $response"
          echo "Response body:"
          cat /tmp/body.json | python3 -m json.tool 2>/dev/null || cat /tmp/body.json

          if [ "$response" != "200" ]; then
            echo "::error::Reconcile failed with HTTP $response"
            exit 1
          fi

          # Fail if errors > 0
          errors=$(cat /tmp/body.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('errors', 0))")
          if [ "$errors" -gt "0" ]; then
            echo "::warning::Reconcile completed with $errors Stripe errors — check CF logs"
          fi
